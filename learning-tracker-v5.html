<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading & Learning Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
/* ══ THEMES ══ */
[data-theme="dark"] {
  --bg: #0e0f13;
  --surface: #16181f;
  --surface2: #1e2029;
  --surface3: #232630;
  --border: #2a2d3a;
  --border2: #363a4a;
  --accent: #c8a97e;
  --accent2: #7ea8c8;
  --accent3: #a87ec8;
  --text: #e8e4dc;
  --muted: #7a7d8a;
  --muted2: #555869;
  --green: #6dbf8a;
  --yellow: #d4b86a;
  --red: #c87e7e;
  --teal: #6dbfb8;
  --shadow: rgba(0,0,0,0.4);
}
[data-theme="light"] {
  --bg: #f5f2ee;
  --surface: #ffffff;
  --surface2: #f0ece6;
  --surface3: #e8e3db;
  --border: #ddd8cf;
  --border2: #c9c3b8;
  --accent: #a07840;
  --accent2: #3a6a8a;
  --accent3: #7a4ea0;
  --text: #1e1c18;
  --muted: #7a7060;
  --muted2: #a09880;
  --green: #3a8a5a;
  --yellow: #8a6a20;
  --red: #a03a3a;
  --teal: #2a7a74;
  --shadow: rgba(0,0,0,0.12);
}

:root { --panel-width: 440px; }

* { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  overflow-x: hidden;
  transition: background 0.25s, color 0.25s;
}

/* ── LAYOUT ── */
.app { display:flex; flex-direction:column; height:100vh; overflow:hidden; }
.app-body { display:flex; flex:1; overflow:hidden; }
.main-col { flex:1; overflow-y:auto; overflow-x:hidden; transition: margin-right 0.3s ease; }
.main-col.panel-open { margin-right: var(--panel-width); }

/* ── HEADER ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 18px 40px;
  flex-shrink: 0;
}
.header-top {
  display:flex; align-items:center; justify-content:space-between; gap:24px; flex-wrap:wrap;
}
.header-title h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.75rem; font-weight:400; color:var(--text); line-height:1.1;
}
.header-title h1 em { color:var(--accent); font-style:italic; }

.header-right { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }

.stats-row { display:flex; gap:20px; align-items:center; flex-wrap:wrap; }
.stat { text-align:center; }
.stat .num { font-family:'Playfair Display',serif; font-size:1.5rem; color:var(--accent); line-height:1; }
.stat .label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-top:2px; }
.stat-div { width:1px; height:28px; background:var(--border); }

.last-edited {
  font-size:11px; color:var(--muted); font-family:'DM Mono',monospace;
  background:var(--surface2); border:1px solid var(--border);
  padding:5px 10px; border-radius:6px; white-space:nowrap;
}

/* Theme toggle */
.theme-toggle {
  background: var(--surface2); border:1px solid var(--border);
  border-radius:20px; padding:4px; display:flex; gap:2px; cursor:pointer;
}
.theme-opt {
  padding:3px 10px; border-radius:16px; border:none; background:transparent;
  font-family:'DM Sans',sans-serif; font-size:11px; color:var(--muted); cursor:pointer;
  transition:all 0.15s;
}
.theme-opt.active { background:var(--accent); color:var(--bg); font-weight:500; }

/* ── CONTROLS ── */
.controls {
  padding:12px 40px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;
  border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:0; z-index:10;
}
.filter-btn {
  padding:5px 12px; border-radius:20px; border:1px solid var(--border);
  background:transparent; color:var(--muted); cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:12px; letter-spacing:0.02em; transition:all 0.15s;
}
.filter-btn:hover { border-color:var(--accent); color:var(--accent); }
.filter-btn.active { background:var(--accent); border-color:var(--accent); color:var(--bg); font-weight:500; }
.filter-sep { width:1px; height:18px; background:var(--border); margin:0 2px; }

.view-toggle {
  display:flex; gap:0; background:var(--surface2); border:1px solid var(--border); border-radius:6px; overflow:hidden;
}
.view-btn {
  padding:5px 12px; border:none; background:transparent; color:var(--muted);
  font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; transition:all 0.15s;
}
.view-btn.active { background:var(--accent); color:var(--bg); font-weight:500; }

.search-box {
  display:flex; align-items:center; gap:6px; background:var(--surface);
  border:1px solid var(--border); border-radius:6px; padding:5px 10px;
}
.search-box input {
  background:transparent; border:none; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:12px; outline:none; width:160px;
}
.search-box input::placeholder { color:var(--muted2); }

.controls-right { margin-left:auto; display:flex; gap:8px; align-items:center; }
.add-btn {
  padding:6px 14px; background:var(--accent); color:var(--bg); border:none;
  border-radius:6px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:opacity 0.15s;
}
.add-btn:hover { opacity:0.85; }

/* Status filter select */
.status-filter-select {
  background:var(--surface); border:1px solid var(--border); border-radius:6px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:12px; padding:5px 10px;
  outline:none; cursor:pointer;
}
.status-filter-select option { background:var(--surface); }

/* ── MAIN CONTENT ── */
main { padding:24px 40px; }

/* Section headers */
.section-block { margin-bottom:32px; }
.section-header {
  display:flex; align-items:center; gap:10px; margin-bottom:12px;
  cursor:pointer; user-select:none; padding:4px 0;
}
.section-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.section-title { font-family:'Playfair Display',serif; font-size:1rem; font-weight:400; color:var(--text); }
.section-meta { font-size:11px; color:var(--muted); background:var(--surface2); padding:2px 8px; border-radius:10px; font-family:'DM Mono',monospace; }
.section-prog { margin-left:auto; display:flex; align-items:center; gap:8px; }
.mini-track { width:70px; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
.mini-fill { height:100%; border-radius:2px; }
.mini-pct { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); min-width:26px; text-align:right; }
.section-chevron { font-size:9px; color:var(--muted2); transition:transform 0.2s; }
.section-chevron.open { transform:rotate(90deg); }

/* Priority tier */
.priority-tier-header {
  padding: 6px 0 10px;
  font-family:'Playfair Display',serif;
  font-size:1.1rem;
  color:var(--text);
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:4px;
}
.tier-pill { font-family:'DM Sans',sans-serif; font-size:11px; padding:3px 10px; border-radius:20px; font-weight:500; }
.tier-active-pill { background:rgba(109,191,138,0.15); color:var(--green); border:1px solid rgba(109,191,138,0.3); }
.tier-queue-pill { background:rgba(212,184,106,0.15); color:var(--yellow); border:1px solid rgba(212,184,106,0.3); }
.tier-someday-pill { background:rgba(122,125,138,0.15); color:var(--muted); border:1px solid var(--border); }
.tier-reference-pill { background:rgba(109,191,184,0.15); color:var(--teal); border:1px solid rgba(109,191,184,0.3); }

/* ── ITEM TABLE ── */
.items-table { width:100%; border-collapse:collapse; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.items-table th {
  background:var(--surface); padding:8px 14px; text-align:left;
  font-size:10px; color:var(--muted); font-weight:400; text-transform:uppercase;
  letter-spacing:0.07em; border-bottom:1px solid var(--border);
}
.items-table td { padding:10px 14px; border-bottom:1px solid var(--border); vertical-align:middle; }
.items-table tr:last-child td { border-bottom:none; }
.items-table tbody tr { cursor:pointer; transition:background 0.1s; }
.items-table tbody tr:hover td { background:var(--surface); }
.items-table tbody tr.selected td { background:var(--surface2); }

.item-title-cell .title { font-weight:400; color:var(--text); font-size:13px; }
.item-title-cell .author { color:var(--muted); font-size:11px; margin-top:2px; }
.item-title-cell .desc-snippet {
  color:var(--muted2); font-size:11px; margin-top:3px; font-style:italic;
  max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.item-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
.item-tag {
  font-size:10px; padding:1px 6px; border-radius:10px;
  background:var(--surface2); color:var(--muted); border:1px solid var(--border);
  font-family:'DM Mono',monospace;
}

.type-badge {
  padding:2px 7px; border-radius:4px; font-size:10px; letter-spacing:0.03em;
  text-transform:uppercase; font-weight:500; white-space:nowrap;
}
.type-book { background:rgba(200,169,126,0.1); color:var(--accent); border:1px solid rgba(200,169,126,0.2); }
.type-paper { background:rgba(126,168,200,0.1); color:var(--accent2); border:1px solid rgba(126,168,200,0.2); }
.type-video { background:rgba(168,126,200,0.1); color:var(--accent3); border:1px solid rgba(168,126,200,0.2); }
.type-podcast { background:rgba(109,191,138,0.1); color:var(--green); border:1px solid rgba(109,191,138,0.2); }
.type-course { background:rgba(200,126,126,0.1); color:var(--red); border:1px solid rgba(200,126,126,0.2); }
.type-article { background:rgba(212,184,106,0.1); color:var(--yellow); border:1px solid rgba(212,184,106,0.2); }

.status-badge {
  padding:3px 9px; border-radius:20px; font-size:11px; font-weight:500;
  cursor:pointer; border:none; font-family:'DM Sans',sans-serif; transition:all 0.15s; white-space:nowrap;
}
.status-not-started { background:var(--surface2); color:var(--muted); }
.status-in-progress { background:rgba(212,184,106,0.12); color:var(--yellow); }
.status-on-pause { background:rgba(126,168,200,0.12); color:var(--accent2); }
.status-processing { background:rgba(168,126,200,0.12); color:var(--accent3); }
.status-complete { background:rgba(109,191,138,0.12); color:var(--green); }
.status-revisit { background:rgba(200,126,126,0.12); color:var(--red); }

.sortable-th {
  cursor:pointer; user-select:none;
}
.sortable-th:hover { color:var(--accent); }
.sort-arrow { font-size:8px; margin-left:3px; opacity:0.5; }

.priority-badge {
  padding:2px 8px; border-radius:4px; font-size:10px; font-weight:500;
  cursor:pointer; border:none; font-family:'DM Sans',sans-serif;
  text-transform:uppercase; letter-spacing:0.04em; transition:all 0.15s;
}
.priority-active { background:rgba(109,191,138,0.12); color:var(--green); }
.priority-queue { background:rgba(212,184,106,0.12); color:var(--yellow); }
.priority-someday { background:rgba(122,125,138,0.1); color:var(--muted); }
.priority-reference { background:rgba(109,191,184,0.12); color:var(--teal); }

.item-progress-bar {
  width:60px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; margin-top:4px;
}
.item-progress-inner { height:100%; background:var(--accent); border-radius:2px; }

/* ── SIDE PANEL ── */
.side-panel {
  position:fixed; top:0; right:0; width:var(--panel-width); height:100vh;
  background:var(--surface); border-left:1px solid var(--border);
  display:flex; flex-direction:column;
  transform:translateX(100%); transition:transform 0.3s ease;
  z-index:50; overflow:hidden;
}
.side-panel.open { transform:translateX(0); }

.panel-header {
  padding:20px 24px 16px; border-bottom:1px solid var(--border);
  display:flex; align-items:flex-start; gap:12px; flex-shrink:0;
}
.panel-header-info { flex:1; min-width:0; }
.panel-title-edit {
  font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:400;
  color:var(--text); line-height:1.3; margin-bottom:4px;
  background:transparent; border:none; outline:none; width:100%;
  border-bottom: 1px solid transparent; transition: border-color 0.15s;
  padding: 2px 0;
}
.panel-title-edit:hover { border-bottom-color: var(--border2); }
.panel-title-edit:focus { border-bottom-color: var(--accent); }
.panel-author-edit {
  font-size:12px; color:var(--muted); background:transparent; border:none; outline:none; width:100%;
  border-bottom: 1px solid transparent; transition: border-color 0.15s;
  padding: 2px 0; font-family:'DM Sans',sans-serif;
}
.panel-author-edit:hover { border-bottom-color: var(--border2); }
.panel-author-edit:focus { border-bottom-color: var(--accent); }
.panel-header-actions { display:flex; gap:6px; align-items:center; flex-shrink:0; }
.panel-close {
  background:none; border:none; color:var(--muted); cursor:pointer;
  font-size:18px; padding:0; line-height:1; transition:color 0.15s;
}
.panel-close:hover { color:var(--text); }
.panel-delete {
  background:none; border:1px solid var(--border); color:var(--muted);
  border-radius:5px; cursor:pointer; font-size:11px; padding:3px 8px;
  font-family:'DM Sans',sans-serif; transition:all 0.15s;
}
.panel-delete:hover { border-color:var(--red); color:var(--red); }

.panel-body { flex:1; overflow-y:auto; padding:20px 24px; }
.panel-section { margin-bottom:22px; }
.panel-section-title {
  font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em;
  margin-bottom:8px; display:flex; align-items:center; gap:8px;
}
.panel-section-title::after { content:''; flex:1; height:1px; background:var(--border); }

.panel-badges { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

.dates-row { display:flex; gap:12px; }
.date-field { flex:1; }
.date-field label { display:block; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px; }
.date-field input[type=date] {
  width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:12px; padding:6px 10px; outline:none;
  transition:border-color 0.15s; color-scheme: dark;
}
[data-theme="light"] .date-field input[type=date] { color-scheme: light; }
.date-field input[type=date]:focus { border-color:var(--accent); }

.panel-textarea {
  width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; padding:10px 12px;
  outline:none; resize:vertical; min-height:80px; transition:border-color 0.15s; line-height:1.5;
}
.panel-textarea:focus { border-color:var(--accent); }
.panel-textarea::placeholder { color:var(--muted2); }

.panel-input {
  width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; padding:8px 12px;
  outline:none; transition:border-color 0.15s;
}
.panel-input:focus { border-color:var(--accent); }
.panel-input::placeholder { color:var(--muted2); }

/* Tags input */
.tags-input-row { display:flex; gap:8px; margin-bottom:6px; }
.tags-display { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:6px; }
.tag-chip {
  font-size:11px; padding:2px 8px; border-radius:10px; display:flex; align-items:center; gap:4px;
  background:var(--surface2); color:var(--muted); border:1px solid var(--border);
  font-family:'DM Mono',monospace;
}
.tag-remove { background:none; border:none; color:var(--muted2); cursor:pointer; font-size:11px; padding:0; line-height:1; transition:color 0.15s; }
.tag-remove:hover { color:var(--red); }

/* Link input */
.link-row { display:flex; gap:8px; margin-bottom:6px; }
.link-input {
  flex:1; background:var(--bg); border:1px solid var(--border); border-radius:6px;
  color:var(--accent2); font-family:'DM Mono',monospace; font-size:11px; padding:6px 10px;
  outline:none; transition:border-color 0.15s;
}
.link-input:focus { border-color:var(--accent2); }
.link-input::placeholder { color:var(--muted2); font-family:'DM Sans',sans-serif; }
.link-label-input {
  width:110px; background:var(--bg); border:1px solid var(--border); border-radius:6px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:12px; padding:6px 10px;
  outline:none; transition:border-color 0.15s;
}
.btn-sm {
  padding:5px 10px; border:1px solid var(--border); background:transparent;
  color:var(--muted); border-radius:6px; cursor:pointer; font-size:11px;
  font-family:'DM Sans',sans-serif; transition:all 0.15s; white-space:nowrap;
}
.btn-sm:hover { border-color:var(--accent); color:var(--accent); }
.btn-sm.danger:hover { border-color:var(--red); color:var(--red); }

/* Segments */
.segments-list { display:flex; flex-direction:column; gap:4px; margin-bottom:8px; }
.segment-row {
  display:flex; align-items:center; gap:8px; padding:7px 10px;
  background:var(--surface2); border-radius:6px; border:1px solid var(--border);
}
.segment-check {
  width:14px; height:14px; border-radius:3px; border:1px solid var(--border2);
  background:transparent; cursor:pointer; flex-shrink:0; appearance:none;
  transition:all 0.15s; position:relative;
}
.segment-check:checked { background:var(--green); border-color:var(--green); }
.segment-check:checked::after { content:'✓'; position:absolute; top:-1px; left:2px; font-size:10px; color:var(--bg); }
.segment-name {
  flex:1; background:transparent; border:none; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:12px; outline:none;
}
.segment-name.done { text-decoration:line-through; color:var(--muted); }
.segment-delete { background:none; border:none; color:var(--muted2); cursor:pointer; font-size:12px; padding:0; transition:color 0.15s; }
.segment-delete:hover { color:var(--red); }
.seg-progress { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-top:2px; }

/* ── ADD MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.65);
  display:flex; align-items:center; justify-content:center;
  z-index:100; opacity:0; pointer-events:none; transition:opacity 0.2s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:28px; width:560px; max-width:94vw; max-height:90vh; overflow-y:auto;
  transform:translateY(12px); transition:transform 0.2s;
}
.modal-overlay.open .modal { transform:translateY(0); }
.modal h2 { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:400; margin-bottom:20px; }
.form-row { margin-bottom:14px; }
.form-row label { display:block; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:5px; }
.form-row input, .form-row select, .form-row textarea {
  width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; padding:8px 11px; outline:none; transition:border-color 0.15s;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color:var(--accent); }
.form-row textarea { resize:vertical; min-height:60px; }
.form-row select option { background:var(--surface); }
.form-cols { display:flex; gap:12px; }
.form-cols .form-row { flex:1; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
.btn-cancel {
  padding:7px 16px; border:1px solid var(--border); background:transparent;
  color:var(--muted); border-radius:6px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; transition:all 0.15s;
}
.btn-cancel:hover { border-color:var(--muted); color:var(--text); }

/* Modal section divider */
.modal-section-label {
  font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em;
  margin: 20px 0 14px; display:flex; align-items:center; gap:8px;
}
.modal-section-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── DELETE CONFIRM MODAL ── */
.confirm-modal {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:24px; width:360px; max-width:92vw;
  transform:translateY(12px); transition:transform 0.2s;
}
.modal-overlay.open .confirm-modal { transform:translateY(0); }
.confirm-modal h3 { font-family:'Playfair Display',serif; font-size:1rem; font-weight:400; margin-bottom:8px; }
.confirm-modal p { color:var(--muted); font-size:13px; margin-bottom:18px; line-height:1.5; }
.btn-danger {
  padding:7px 16px; background:rgba(200,126,126,0.15); border:1px solid rgba(200,126,126,0.3);
  color:var(--red); border-radius:6px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px;
  transition:all 0.15s;
}
.btn-danger:hover { background:rgba(200,126,126,0.25); }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:20px; right:20px; background:var(--surface2);
  border:1px solid var(--border); color:var(--text); padding:9px 16px;
  border-radius:6px; font-size:12px; font-weight:400;
  transform:translateY(50px); opacity:0; transition:all 0.25s; z-index:200;
  box-shadow: 0 4px 12px var(--shadow);
}
.toast.show { transform:translateY(0); opacity:1; }

.hidden { display:none !important; }

.btn-data {
  padding:4px 10px; background:var(--surface2); border:1px solid var(--border);
  color:var(--muted); border-radius:6px; cursor:pointer; font-family:'DM Sans',sans-serif;
  font-size:11px; transition:all 0.15s; white-space:nowrap;
}
.btn-data:hover { border-color:var(--accent); color:var(--accent); }

/* scrollbar */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

</head>
<body>
<div class="app">

<!-- HEADER -->
<header>
  <div class="header-top">
    <div class="header-title">
      <h1>Reading &amp; Learning <em>Tracker</em></h1>
    </div>
    <div class="header-right">
      <div class="stats-row">
        <div class="stat"><div class="num" id="stat-total">0</div><div class="label">Total</div></div>
        <div class="stat-div"></div>
        <div class="stat"><div class="num" id="stat-active">0</div><div class="label">In Progress</div></div>
        <div class="stat-div"></div>
        <div class="stat"><div class="num" id="stat-complete">0</div><div class="label">Done</div></div>
        <div class="stat-div"></div>
        <div class="stat"><div class="num" id="stat-revisit">0</div><div class="label">Revisit</div></div>
      </div>
      <div class="last-edited" id="last-edited-display">Last edited: —</div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn-data" onclick="exportData()" title="Export all your data as a JSON backup file">⬇ Export</button>
        <button class="btn-data" onclick="document.getElementById('import-file').click()" title="Import a previously exported JSON backup">⬆ Import</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      </div>
      <div class="theme-toggle">
        <button class="theme-opt active" id="theme-dark" onclick="setTheme('dark')">Dark</button>
        <button class="theme-opt" id="theme-light" onclick="setTheme('light')">Light</button>
      </div>
    </div>
  </div>
</header>

<!-- CONTROLS -->
<div class="controls">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <div class="filter-sep"></div>
  <button class="filter-btn" onclick="setFilter('book',this)">📚 Books</button>
  <button class="filter-btn" onclick="setFilter('paper',this)">📄 Papers</button>
  <button class="filter-btn" onclick="setFilter('article',this)">📰 Articles</button>
  <button class="filter-btn" onclick="setFilter('video',this)">🎥 Videos</button>
  <button class="filter-btn" onclick="setFilter('course',this)">🎓 Courses</button>
  <button class="filter-btn" onclick="setFilter('podcast',this)">🎙️ Podcasts</button>
  <select class="status-filter-select" id="status-filter" onchange="setStatusFilter(this.value)">
    <option value="all">All Statuses</option>
    <option value="not-started">Not Started</option>
    <option value="in-progress">In Progress</option>
    <option value="on-pause">On Pause</option>
    <option value="processing">Processing</option>
    <option value="complete">Complete</option>
    <option value="revisit">Revisit</option>
  </select>
  <div class="view-toggle">
    <button class="view-btn active" onclick="setView('topic',this)">By Topic</button>
    <button class="view-btn" onclick="setView('priority',this)">By Priority</button>
  </div>
  <div class="controls-right">
    <div class="search-box">
      <span style="color:var(--muted);font-size:11px">⌕</span>
      <input type="text" placeholder="Search..." oninput="setSearch(this.value)">
    </div>
    <button class="add-btn" onclick="openAddModal()">+ Add Item</button>
  </div>
</div>

<!-- MAIN -->
<div class="app-body">
  <div class="main-col" id="main-col">
    <main id="main-content"></main>
  </div>

  <!-- SIDE PANEL -->
  <div class="side-panel" id="side-panel">
    <div class="panel-header">
      <div class="panel-header-info">
        <input class="panel-title-edit" id="panel-title-edit" type="text" placeholder="Title" onchange="updatePanelTitle(this.value)" onblur="updatePanelTitle(this.value)">
        <input class="panel-author-edit" id="panel-author-edit" type="text" placeholder="Author / Creator" onchange="updatePanelAuthor(this.value)" onblur="updatePanelAuthor(this.value)">
      </div>
      <div class="panel-header-actions">
        <button class="panel-delete" id="panel-delete-btn" onclick="confirmDelete()">Delete</button>
        <button class="panel-close" onclick="closePanel()">✕</button>
      </div>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal" onclick="closeModalOnBg(event)">
  <div class="modal">
    <h2>Add New Item</h2>

    <!-- Core fields -->
    <div class="form-row"><label>Title</label><input type="text" id="f-title" placeholder="Full title of book, paper, course..."></div>
    <div class="form-row"><label>Author / Creator</label><input type="text" id="f-author" placeholder="Author or creator name"></div>
    <div class="form-cols">
      <div class="form-row"><label>Type</label>
        <select id="f-type">
          <option value="book">Book</option>
          <option value="paper">Research Paper</option>
          <option value="article">Article</option>
          <option value="video">Video / Lecture</option>
          <option value="course">Course</option>
          <option value="podcast">Podcast</option>
        </select>
      </div>
      <div class="form-row"><label>Priority</label>
        <select id="f-priority">
          <option value="active">Active</option>
          <option value="queue">Queue</option>
          <option value="someday" selected>Someday</option>
          <option value="reference">Reference</option>
        </select>
      </div>
    </div>
    <div class="form-row"><label>Topic</label>
      <select id="f-topic">
        <option>Attitudes & Behavior Change</option>
        <option>Clinical Application & Intervention</option>
        <option>Clinical Theory</option>
        <option>Cultural & Systemic Factors</option>
        <option>Existential & Humanistic Psychology</option>
        <option>Foundations of Social Psychology</option>
        <option>General Mental Health & Diagnosis</option>
        <option>Group Dynamics & Conformity</option>
        <option>Influence & Persuasion</option>
        <option>Interpersonal Processes</option>
        <option>Social Cognition & Bias</option>
        <option>Trauma & Adversity</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-row"><label>Tags (comma-separated)</label><input type="text" id="f-tags" placeholder="e.g. trauma, somatic, cbt"></div>
    <div class="form-row"><label>Description</label><textarea id="f-description" placeholder="A brief description of what this work covers..."></textarea></div>
    <div class="form-row"><label>Why I want to study this</label><textarea id="f-why" placeholder="What draws you to this? Why does it matter to your learning?"></textarea></div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="add-btn" onclick="submitAdd()">Add to List</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="delete-modal" onclick="closeDeleteModalOnBg(event)">
  <div class="confirm-modal">
    <h3>Delete this item?</h3>
    <p id="delete-modal-text">This will permanently remove the item and all its notes and progress.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn-danger" onclick="executeDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- IMPORT CONFIRM MODAL -->
<div class="modal-overlay" id="import-modal" onclick="if(event.target===this)closeImportModal()">
  <div class="confirm-modal">
    <h3>Import backup?</h3>
    <p id="import-modal-text"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeImportModal()">Cancel</button>
      <button class="add-btn" onclick="executeImport()">Import</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const TOPICS = [
  { name:"Attitudes & Behavior Change", color:"#d4b86a", items:[
    { title:"Changing for Good: A Revolutionary Six-Stage Program for Overcoming Bad Habits and Moving Your Life Positively Forward", author:"James O. Prochaska, John C. Norcross & Carlo C. DiClemente", type:"book",

    { title:"Mindset: The New Psychology of Success", author:"Carol S. Dweck", type:"book",

  ]},
  { name:"Clinical Application & Intervention", color:"#7ec8b8", items:[
    { title:"A Meta-Analysis of Psychotherapy Outcome Studies", author:"Mary Lee Smith & Gene V. Glass", type:"paper",

    { title:"APA Division 12: Research-Supported Psychological Treatments", author:"American Psychological Association", type:"course",

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
function loadState() { try { return JSON.parse(localStorage.getItem('tracker-v3-state') || '{}'); } catch(e) { return {}; } }
function loadCustom() { try { return JSON.parse(localStorage.getItem('tracker-v3-custom') || '[]'); } catch(e) { return []; } }
function loadMeta() { try { return JSON.parse(localStorage.getItem('tracker-v3-meta') || '{}'); } catch(e) { return {}; } }

let STATE = loadState();
let CUSTOM = loadCustom();
let META = loadMeta();

let currentFilter = 'all';
let currentStatusFilter = 'all';
let currentView = 'topic';
let currentSearch = '';
let selectedKey = null;
let pendingDeleteKey = null;
let SORT_STATE = {};

function save() {
  localStorage.setItem('tracker-v3-state', JSON.stringify(STATE));
  META.lastEdited = new Date().toISOString();
  localStorage.setItem('tracker-v3-meta', JSON.stringify(META));
  updateLastEdited();
}
function saveCustom() { localStorage.setItem('tracker-v3-custom', JSON.stringify(CUSTOM)); }

function updateLastEdited() {
  const el = document.getElementById('last-edited-display');
  if (!META.lastEdited) { el.textContent = 'Last edited: —'; return; }
  const d = new Date(META.lastEdited);
  const dateStr = d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  const timeStr = d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
  el.textContent = `Last edited: ${dateStr} ${timeStr}`;
}

function makeKey(topicName, idx) { return `${topicName}||${idx}`; }
function makeCustomKey(ci) { return `custom||${ci}`; }

function defaultItemState() {
  return { status:'not-started', priority:'someday', revisit:false, why:'', description:'', takeaways:'', dateStarted:'', dateFinished:'', links:[], segments:[], location:'', tags:[], year:'', publisher:'', edition:'', doi:'', citation:'' };
}

function getAllTopics() {
  let topics = TOPICS.map(t => ({ ...t, items: t.items.map((item,i) => ({ ...item, _key: makeKey(t.name, i) })) }));
  CUSTOM.forEach((c, ci) => {
    if (c._deleted) return;
    let topic = topics.find(t => t.name === c.topic);
    if (!topic) {
      topic = { name: c.topic, color:'#c8a97e', items:[] };
      topics.push(topic);
    }
    topic.items.push({ ...c, _key: makeCustomKey(ci) });
  });
  return topics;
}

function getItemState(key) {
  if (!STATE[key]) STATE[key] = defaultItemState();
  const s = STATE[key];
  if (!s.tags) s.tags = [];
  if (s.location === undefined) s.location = '';
  if (s.year === undefined) s.year = '';
  if (s.publisher === undefined) s.publisher = '';
  if (s.edition === undefined) s.edition = '';
  if (s.doi === undefined) s.doi = '';
  if (s.citation === undefined) s.citation = '';
  if (s.description === undefined) s.description = '';
  if (s.notes !== undefined) delete s.notes; // remove legacy notes field
  return s;
}

function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  META.theme = t;
  localStorage.setItem('tracker-v3-meta', JSON.stringify(META));
  document.getElementById('theme-dark').classList.toggle('active', t==='dark');
  document.getElementById('theme-light').classList.toggle('active', t==='light');
}
(function() {
  const t = META.theme || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  setTimeout(() => {
    document.getElementById('theme-dark').classList.toggle('active', t==='dark');
    document.getElementById('theme-light').classList.toggle('active', t==='light');
  }, 0);
})();

// ══════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════
function render() {
  const topics = getAllTopics();
  const filtered = topics.map(topic => {
    const items = topic.items.filter(item => {
      const s = getItemState(item._key);
      if (s._hidden) return false;
      if (!['all'].includes(currentFilter) && item.type !== currentFilter) return false;
      if (currentStatusFilter !== 'all' && s.status !== currentStatusFilter) return false;
      if (currentSearch) {
        const q = currentSearch.toLowerCase();
        const tagMatch = (s.tags||[]).some(t => t.toLowerCase().includes(q));
        if (!item.title.toLowerCase().includes(q) && !(item.author||'').toLowerCase().includes(q) && !tagMatch) return false;
      }
      return true;
    });
    return { ...topic, items };
  }).filter(t => t.items.length > 0);

  const main = document.getElementById('main-content');
  main.innerHTML = '';

  if (filtered.length === 0) {
    main.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);font-style:italic;font-family:Playfair Display,serif">No items match your filters.</div>';
    updateStats(topics);
    return;
  }

  if (currentView === 'topic') {
    filtered.forEach(topic => main.appendChild(renderTopicSection(topic)));
  } else {
    renderPriorityView(main, filtered);
  }

  updateStats(topics);
  updateLastEdited();
}

function renderTopicSection(topic) {
  const div = document.createElement('div');
  div.className = 'section-block';
  div.innerHTML = `
    <div class="section-header" onclick="toggleSection(this)">
      <div class="section-dot" style="background:${topic.color}"></div>
      <span class="section-title">${topic.name}</span>
      <span class="section-meta">${topic.items.length}</span>
      <span class="section-chevron open" style="margin-left:auto">▶</span>
    </div>
    <div class="section-body">${renderItemTable(topic.items, topic.color, topic.name)}</div>
  `;
  return div;
}

function renderPriorityView(main, topics) {
  const tiers = [
    { key:'active',    label:'Active',    pillClass:'tier-active-pill',    desc:'Currently working through' },
    { key:'queue',     label:'Queue',     pillClass:'tier-queue-pill',     desc:'Up next when ready' },
    { key:'someday',   label:'Someday',   pillClass:'tier-someday-pill',   desc:'On the radar, no rush' },
    { key:'reference', label:'Reference', pillClass:'tier-reference-pill', desc:'Previously read or studied' },
  ];
  tiers.forEach(tier => {
    let tierItems = [];
    topics.forEach(topic => {
      topic.items.forEach(item => {
        const s = getItemState(item._key);
        if (s.priority === tier.key) tierItems.push({ ...item, _topicColor: topic.color });
      });
    });
    if (tierItems.length === 0) return;
    tierItems.sort((a,b) => a.title.localeCompare(b.title));
    const div = document.createElement('div');
    div.className = 'section-block';
    div.innerHTML = `
      <div class="priority-tier-header">
        <span class="tier-pill ${tier.pillClass}">${tier.label}</span>
        <span style="font-size:13px;color:var(--muted);font-family:DM Sans,sans-serif;font-weight:300">${tier.desc}</span>
        <span style="margin-left:auto;font-family:DM Mono,monospace;font-size:11px;color:var(--muted)">${tierItems.length} items</span>
      </div>
      ${renderItemTable(tierItems, null, tier.key)}
    `;
    main.appendChild(div);
  });
}

function renderItemTable(items, topicColor, topicName) {
  const sortKey = topicName || '__priority__';
  const ss = SORT_STATE[sortKey] || { col:'title', dir:1 };

  const STATUS_RANK = {'not-started':0,'in-progress':1,'on-pause':2,'processing':3,'complete':4,'revisit':5};
  const PRIORITY_RANK = {'active':0,'queue':1,'someday':2,'reference':3};

  const sorted = [...items].sort((a,b) => {
    const sa = getItemState(a._key), sb = getItemState(b._key);
    let cmp = 0;
    if (ss.col === 'title') cmp = a.title.localeCompare(b.title);
    else if (ss.col === 'type') cmp = (sa._typeOverride||a.type).localeCompare(sb._typeOverride||b.type);
    else if (ss.col === 'priority') cmp = PRIORITY_RANK[sa.priority] - PRIORITY_RANK[sb.priority];
    else if (ss.col === 'status') cmp = STATUS_RANK[sa.status] - STATUS_RANK[sb.status];
    return cmp * ss.dir;
  });

  function thArrow(col) {
    if (ss.col !== col) return '<span class="sort-arrow">⇅</span>';
    return `<span class="sort-arrow">${ss.dir === 1 ? '↑' : '↓'}</span>`;
  }
  function thClick(col) {
    return `onclick="setSortCol('${topicName||'__priority__'}','${col}')"`;
  }

  let rows = sorted.map(item => {
    const s = getItemState(item._key);
    const segDone = s.segments.filter(sg => sg.done).length;
    const segTotal = s.segments.length;
    const segBar = segTotal > 0 ? `<div class="item-progress-bar"><div class="item-progress-inner" style="width:${Math.round(segDone/segTotal*100)}%"></div></div>` : '';
    // Show description snippet, fallback to why
    const snippetText = s.description || s.why || '';
    const descSnippet = snippetText ? `<div class="desc-snippet">${escHtml(snippetText)}</div>` : '';
    const tagsHtml = (s.tags||[]).length > 0
      ? `<div class="item-tags">${s.tags.map(t=>`<span class="item-tag">${escHtml(t)}</span>`).join('')}</div>`
      : '';
    const selectedClass = selectedKey === item._key ? 'selected' : '';
    const itemType = s._typeOverride || item.type;

    return `<tr class="${selectedClass}" onclick="openPanel('${item._key.replace(/'/g,"\\'")}')">
      <td>
        <div class="item-title-cell">
          <div class="title">${escHtml(item.title)}</div>
          ${item.author ? `<div class="author">${escHtml(item.author)}</div>` : ''}
          ${descSnippet}
          ${tagsHtml}
          ${segBar}
        </div>
      </td>
      <td><span class="type-badge type-${itemType}">${itemType}</span></td>
      <td>
        <button class="priority-badge priority-${s.priority}"
          onclick="event.stopPropagation();cyclePriority('${item._key.replace(/'/g,"\\'")}',this)">
          ${capFirst(s.priority)}
        </button>
      </td>
      <td>
        <button class="status-badge status-${s.status}"
          onclick="event.stopPropagation();cycleStatus('${item._key.replace(/'/g,"\\'")}',this)">
          ${formatStatus(s.status)}
        </button>
      </td>
    </tr>`;
  }).join('');

  return `<table class="items-table">
    <thead><tr>
      <th class="sortable-th" ${thClick('title')}>Title ${thArrow('title')}</th>
      <th class="sortable-th" style="width:80px" ${thClick('type')}>Type ${thArrow('type')}</th>
      <th class="sortable-th" style="width:100px" ${thClick('priority')}>Priority ${thArrow('priority')}</th>
      <th class="sortable-th" style="width:120px" ${thClick('status')}>Status ${thArrow('status')}</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function updatePanelTitle(val) {
  if (!selectedKey) return;
  if (selectedKey.startsWith('custom||')) {
    const ci = parseInt(selectedKey.split('||')[1]);
    if (CUSTOM[ci]) { CUSTOM[ci].title = val; saveCustom(); }
  } else {
    getItemState(selectedKey)._titleOverride = val;
    save();
  }
  save();
  render();
}

function updatePanelAuthor(val) {
  if (!selectedKey) return;
  if (selectedKey.startsWith('custom||')) {
    const ci = parseInt(selectedKey.split('||')[1]);
    if (CUSTOM[ci]) { CUSTOM[ci].author = val; saveCustom(); }
  } else {
    getItemState(selectedKey)._authorOverride = val;
    save();
  }
  save();
  render();
}

  const titleEl = document.getElementById('panel-title-edit');
  const authorEl = document.getElementById('panel-author-edit');
  // Use override if set, else use item data
  titleEl.value = s._titleOverride || item.title || '';
  authorEl.value = s._authorOverride || item.author || '';

  document.getElementById('side-panel').classList.add('open');
  document.getElementById('main-col').classList.add('panel-open');

  renderPanelBody(key, item, s);
  render();
}

function renderTags(key) {
  const s = getItemState(key);
  const display = document.getElementById(`tags-display-${sanitize(key)}`);
  if (!display) return;
  display.innerHTML = (s.tags||[]).map((t,i) =>
    `<span class="tag-chip">${escHtml(t)}<button class="tag-remove" onclick="removeTag('${key.replace(/'/g,"\\'")}',${i})">✕</button></span>`
  ).join('');
}

function handleTagInput(e, key) {
  if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTagFromInput(key); }
}

function addTagFromInput(key) {
  const input = document.getElementById(`tag-input-${sanitize(key)}`);
  if (!input) return;
  const val = input.value.trim().replace(/,/g,'').toLowerCase();
  if (!val) return;
  const s = getItemState(key);
  if (!s.tags) s.tags = [];
  if (!s.tags.includes(val)) { s.tags.push(val); save(); renderTags(key); render(); }
  input.value = '';
}

function removeTag(key, i) {
  const s = getItemState(key);
  s.tags.splice(i,1);
  save(); renderTags(key); render();
}

function renderSegments(key) {
  const s = getItemState(key);
  const list = document.getElementById(`seg-list-${sanitize(key)}`);
  const prog = document.getElementById(`seg-prog-${sanitize(key)}`);
  if (!list) return;
  list.innerHTML = '';
  s.segments.forEach((seg, i) => {
    const row = document.createElement('div');
    row.className = 'segment-row';
    row.innerHTML = `
      <input type="checkbox" class="segment-check" ${seg.done?'checked':''} onchange="toggleSegment('${key.replace(/'/g,"\\'")}',${i},this.checked)">
      <input class="segment-name ${seg.done?'done':''}" value="${escHtml(seg.name)}" placeholder="Chapter or section name"
        onchange="renameSegment('${key.replace(/'/g,"\\'")}',${i},this.value)" onblur="renameSegment('${key.replace(/'/g,"\\'")}',${i},this.value)">
      <button class="segment-delete" onclick="deleteSegment('${key.replace(/'/g,"\\'")}',${i})">✕</button>
    `;
    list.appendChild(row);
  });
  const done = s.segments.filter(sg => sg.done).length;
  const total = s.segments.length;
  prog.textContent = total > 0 ? `${done} of ${total} complete (${Math.round(done/total*100)}%)` : '';
}

function renderLinks(key) {
  const s = getItemState(key);
  const list = document.getElementById(`links-list-${sanitize(key)}`);
  if (!list) return;
  list.innerHTML = '';
  (s.links||[]).forEach((link, i) => {
    const row = document.createElement('div');
    row.className = 'link-row';
    row.innerHTML = `
      <input class="link-label-input" value="${escHtml(link.label||'')}" placeholder="Label" onchange="updateLink('${key.replace(/'/g,"\\'")}',${i},'label',this.value)">
      <input class="link-input" value="${escHtml(link.url||'')}" placeholder="https://..." onchange="updateLink('${key.replace(/'/g,"\\'")}',${i},'url',this.value)">
      <button class="btn-sm danger" onclick="deleteLink('${key.replace(/'/g,"\\'")}',${i})">✕</button>
    `;
    list.appendChild(row);
  });
}

function closePanel() {
  selectedKey = null;
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('main-col').classList.remove('panel-open');
  render();
}

// ══════════════════════════════════════════════════
// DELETE
// ══════════════════════════════════════════════════
function confirmDelete() {
  if (!selectedKey) return;
  const item = getAllItemsFlat().find(i => i._key === selectedKey);
  pendingDeleteKey = selectedKey;
  document.getElementById('delete-modal-text').textContent =
    `"${item ? item.title : 'This item'}" will be permanently removed along with all its notes and progress.`;
  document.getElementById('delete-modal').classList.add('open');
}

function closeDeleteModal() {
  document.getElementById('delete-modal').classList.remove('open');
  pendingDeleteKey = null;
}

function closeDeleteModalOnBg(e) { if(e.target===document.getElementById('delete-modal')) closeDeleteModal(); }

function executeDelete() {
  const key = pendingDeleteKey;
  if (!key) return;
  if (key.startsWith('custom||')) {
    const ci = parseInt(key.split('||')[1]);
    if (CUSTOM[ci]) { CUSTOM[ci]._deleted = true; saveCustom(); }
    delete STATE[key];
  } else {
    if (!STATE[key]) STATE[key] = defaultItemState();
    STATE[key]._hidden = true;
  }
  save();
  closeDeleteModal();
  closePanel();
  showToast('Item deleted');
  render();
}

// ══════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════
function toggleSection(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.section-chevron');
  body.classList.toggle('hidden');
  chevron.classList.toggle('open');
}

const STATUS_ORDER = ['not-started','in-progress','on-pause','processing','complete','revisit'];
const PRIORITY_ORDER = ['active','queue','someday','reference'];

function setSortCol(topicName, col) {
  const ss = SORT_STATE[topicName] || { col:'title', dir:1 };
  if (ss.col === col) { SORT_STATE[topicName] = { col, dir: ss.dir * -1 }; }
  else { SORT_STATE[topicName] = { col, dir: 1 }; }
  render();
  if (selectedKey) openPanel(selectedKey);
}

function cycleStatus(key, btn) {
  const s = getItemState(key);
  const next = STATUS_ORDER[(STATUS_ORDER.indexOf(s.status)+1) % STATUS_ORDER.length];
  s.status = next;
  save();
  btn.className = `status-badge status-${next}`;
  btn.textContent = formatStatus(next);
  updateStats(getAllTopics());
  showToast(next==='complete'?'✓ Marked complete!': next==='in-progress'?'◑ In progress': next==='on-pause'?'⏸ On pause': next==='processing'?'◎ Processing': next==='revisit'?'🔁 Revisit':'↩ Reset');
}

function cyclePriority(key, btn) {
  const s = getItemState(key);
  const next = PRIORITY_ORDER[(PRIORITY_ORDER.indexOf(s.priority)+1) % PRIORITY_ORDER.length];
  s.priority = next;
  save();
  btn.className = `priority-badge priority-${next}`;
  btn.textContent = capFirst(next);
  if (currentView === 'priority') render();
}

function cyclePanelStatus(key) {
  const s = getItemState(key);
  s.status = STATUS_ORDER[(STATUS_ORDER.indexOf(s.status)+1) % STATUS_ORDER.length];
  save(); render(); openPanel(key);
}

function cyclePanelPriority(key) {
  const s = getItemState(key);
  s.priority = PRIORITY_ORDER[(PRIORITY_ORDER.indexOf(s.priority)+1) % PRIORITY_ORDER.length];
  save(); render(); openPanel(key);
}

function updateItemType(key, newType) {
  if (key.startsWith('custom||')) {
    const ci = parseInt(key.split('||')[1]);
    if (CUSTOM[ci]) { CUSTOM[ci].type = newType; saveCustom(); }
  } else {
    getItemState(key)._typeOverride = newType;
  }
  save(); render();
}

function updateField(key, field, val) {
  getItemState(key)[field] = val;
  save();
  if (field === 'description') render();
}

function onFinish(key) {
  const s = getItemState(key);
  if (s.dateFinished && s.status !== 'complete') {
    s.status = 'complete'; save();
    showToast('✓ Marked complete!');
    render(); openPanel(key);
  }
}

function addSegment(key) {
  const s = getItemState(key);
  s.segments.push({ name:'', done:false });
  save(); renderSegments(key);
  const list = document.getElementById(`seg-list-${sanitize(key)}`);
  if (list) { const inputs = list.querySelectorAll('.segment-name'); if(inputs.length) inputs[inputs.length-1].focus(); }
}

function toggleSegment(key, i, val) {
  const s = getItemState(key);
  s.segments[i].done = val;
  save(); renderSegments(key); render(); openPanel(key);
}

function renameSegment(key, i, val) { getItemState(key).segments[i].name = val; save(); }

function deleteSegment(key, i) {
  getItemState(key).segments.splice(i,1);
  save(); renderSegments(key); render(); openPanel(key);
}

function addLink(key) {
  const s = getItemState(key);
  if (!s.links) s.links = [];
  s.links.push({ label:'', url:'' });
  save(); renderLinks(key);
}

function updateLink(key, i, field, val) { getItemState(key).links[i][field] = val; save(); }

function deleteLink(key, i) {
  getItemState(key).links.splice(i,1);
  save(); renderLinks(key);
}

// ══════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════
function updateStats(topics) {
  let total=0, active=0, complete=0, revisit=0;
  topics.forEach(t => t.items.forEach(item => {
    if (STATE[item._key]?._deleted || STATE[item._key]?._hidden) return;
    const s = getItemState(item._key);
    total++;
    if (s.status==='in-progress') active++;
    if (s.status==='complete') complete++;
    if (s.status==='revisit') revisit++;
  }));
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-complete').textContent = complete;
  document.getElementById('stat-revisit').textContent = revisit;
}

// ══════════════════════════════════════════════════
// FILTERS / VIEW
// ══════════════════════════════════════════════════
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setStatusFilter(val) { currentStatusFilter = val; render(); }

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setSearch(val) { currentSearch = val; render(); }

// ══════════════════════════════════════════════════
// ADD ITEM MODAL
// ══════════════════════════════════════════════════
function openAddModal() { document.getElementById('add-modal').classList.add('open'); }
function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
  ['f-title','f-author','f-why','f-tags','f-description'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
}
function closeModalOnBg(e) { if(e.target===document.getElementById('add-modal')) closeAddModal(); }

function submitAdd() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { showToast('Please enter a title'); return; }
  const rawTags = document.getElementById('f-tags').value;
  const tags = rawTags ? rawTags.split(',').map(t=>t.trim().toLowerCase()).filter(Boolean) : [];

  const item = {
    title,
    author: document.getElementById('f-author').value.trim(),
    type: document.getElementById('f-type').value,
    topic: document.getElementById('f-topic').value,
  };
  const ci = CUSTOM.length;
  CUSTOM.push(item);
  saveCustom();
  const key = makeCustomKey(ci);
  STATE[key] = {
    ...defaultItemState(),
    priority: document.getElementById('f-priority').value,
    why: document.getElementById('f-why').value.trim(),
    description: document.getElementById('f-description').value.trim(),
    tags,
  };
  save();
  closeAddModal();
  render();
  showToast('Item added!');
}

// ══════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════
function getAllItemsFlat() {
  const topics = getAllTopics();
  const items = [];
  topics.forEach(t => t.items.forEach(item => items.push(item)));
  return items;
}

function formatStatus(s) {
  if (s==='not-started') return '○ Not started';
  if (s==='in-progress') return '◑ In progress';
  if (s==='on-pause')    return '⏸ On pause';
  if (s==='processing')  return '◎ Processing';
  if (s==='complete')    return '✓ Complete';
  if (s==='revisit')     return '🔁 Revisit';
  return s;
}

function capFirst(s) { return s ? s[0].toUpperCase()+s.slice(1) : s; }
function sanitize(s) { return s.replace(/[^a-zA-Z0-9]/g,'_'); }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════════
// EXPORT / IMPORT
// ══════════════════════════════════════════════════
function exportData() {
  const payload = {
    _version: 3,
    _exported: new Date().toISOString(),
    state: STATE,
    custom: CUSTOM,
    meta: META,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `learning-tracker-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Data exported!');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const payload = JSON.parse(e.target.result);
      if (!payload.state) throw new Error('Invalid backup file');
      const dateStr = payload._exported ? new Date(payload._exported).toLocaleString() : 'unknown date';
      pendingImportPayload = payload;
      document.getElementById('import-modal-text').textContent =
        `Load backup from ${dateStr}? This will replace your current data — export first if you want to keep it.`;
      document.getElementById('import-modal').classList.add('open');
    } catch(err) {
      showToast('⚠ Could not read file — make sure it\'s a valid tracker export');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

let pendingImportPayload = null;

function closeImportModal() {
  document.getElementById('import-modal').classList.remove('open');
  pendingImportPayload = null;
}

function executeImport() {
  if (!pendingImportPayload) return;
  const payload = pendingImportPayload;
  STATE = payload.state;
  CUSTOM = payload.custom || [];
  META = payload.meta || {};
  localStorage.setItem('tracker-v3-state', JSON.stringify(STATE));
  localStorage.setItem('tracker-v3-custom', JSON.stringify(CUSTOM));
  localStorage.setItem('tracker-v3-meta', JSON.stringify(META));
  setTheme(META.theme || 'dark');
  closeImportModal();
  render();
  showToast('✓ Data imported successfully!');
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
TOPICS.forEach(topic => {
  topic.items.forEach((item, i) => {
    const key = makeKey(topic.name, i);
    if (!STATE[key]) STATE[key] = defaultItemState();
  });
});
CUSTOM.forEach((c, ci) => {
  if (c._deleted) return;
  const key = makeCustomKey(ci);
  if (!STATE[key]) STATE[key] = defaultItemState();
});
save();
render();
</script>
